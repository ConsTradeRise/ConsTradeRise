<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — ConsTradeRise</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .msg-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 64px);
      overflow: hidden;
    }
    @media(max-width:680px) {
      .msg-layout { grid-template-columns: 1fr; }
      .msg-sidebar { display: none; }
      .msg-sidebar.show { display: flex; }
      .msg-main { display: none; }
      .msg-main.show { display: flex; }
    }

    /* Sidebar */
    .msg-sidebar {
      border-right: 1px solid var(--gray-200);
      display: flex; flex-direction: column;
      background: #fff;
    }
    .msg-sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-200);
      font-size: 15px; font-weight: 800;
      display: flex; align-items: center; justify-content: space-between;
    }
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; cursor: pointer;
      border-bottom: 1px solid var(--gray-100);
      transition: background .1s;
    }
    .conv-item:hover { background: var(--gray-50); }
    .conv-item.active { background: var(--blue-light); }
    .conv-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-size: 14px; font-weight: 700; color: var(--gray-900); }
    .conv-preview { font-size: 12px; color: var(--gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-unread { background: var(--blue); color: #fff; border-radius: 100px; font-size: 11px; font-weight: 700; padding: 2px 7px; flex-shrink: 0; }

    /* Main chat area */
    .msg-main {
      display: flex; flex-direction: column;
      background: var(--gray-50);
    }
    .msg-header {
      background: #fff; border-bottom: 1px solid var(--gray-200);
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    }
    .msg-header-name { font-size: 15px; font-weight: 800; }
    .msg-header-role { font-size: 12px; color: var(--gray-500); }
    .msg-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .msg-bubble-wrap { display: flex; gap: 8px; }
    .msg-bubble-wrap.mine { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 70%; padding: 10px 14px;
      border-radius: 16px; font-size: 14px; line-height: 1.5;
    }
    .msg-bubble.theirs { background: #fff; border: 1px solid var(--gray-200); color: var(--gray-800); border-bottom-left-radius: 4px; }
    .msg-bubble.mine   { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 11px; color: var(--gray-400); margin-top: 3px; text-align: right; }
    .msg-time.theirs { text-align: left; }

    .msg-composer {
      background: #fff; border-top: 1px solid var(--gray-200);
      padding: 14px 20px; display: flex; gap: 10px; align-items: flex-end;
    }
    .msg-input {
      flex: 1; resize: none; border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg); padding: 10px 14px;
      font-size: 14px; font-family: var(--font);
      max-height: 120px; min-height: 42px; line-height: 1.5;
      outline: none;
    }
    .msg-input:focus { border-color: var(--blue); }

    .msg-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--gray-400); gap: 12px; text-align: center; padding: 40px;
    }
    .msg-empty-icon { font-size: 48px; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container nav-inner">
    <a href="/" class="logo">ConsTradeRise</a>
    <div class="nav-links" id="navLinks">
      <a href="/jobs.html">Browse Jobs</a>
      <a href="#" id="navDashboardLink" style="display:none">Dashboard</a>
      <a href="#" id="navLogoutBtn" style="display:none" class="btn btn-ghost">Logout</a>
      <a href="/login.html" id="navLoginBtn" class="btn btn-ghost">Login</a>
      <a href="/register.html" id="navRegisterBtn" class="btn btn-primary">Get Started</a>
    </div>
    <button class="nav-toggle" id="navToggle">&#9776;</button>
  </div>
</nav>

<div class="msg-layout">

  <!-- Sidebar: conversation list -->
  <aside class="msg-sidebar" id="msgSidebar">
    <div class="msg-sidebar-header">
      Messages
      <a href="/dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <div class="conv-list" id="convList">
      <div style="padding:30px;text-align:center;"><div class="spinner"></div></div>
    </div>
  </aside>

  <!-- Main: chat window -->
  <div class="msg-main" id="msgMain">
    <div class="msg-empty" id="msgEmpty">
      <div class="msg-empty-icon">💬</div>
      <strong>Your Messages</strong>
      <p style="font-size:14px;">Select a conversation or start a new one from a job application.</p>
    </div>
    <div id="chatArea" style="display:none;flex:1;flex-direction:column;display:none;">
      <div class="msg-header" id="chatHeader"></div>
      <div class="msg-body" id="chatBody"></div>
      <div class="msg-composer">
        <textarea class="msg-input" id="msgInput" placeholder="Type a message..." rows="1"></textarea>
        <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

</div>

<script src="/app.js"></script>
<script>
let currentUserId  = null;
let activeConvId   = null;
let pollInterval   = null;

document.addEventListener('DOMContentLoaded', async () => {
  if (Auth.redirectIfNotAuth()) return;
  currentUserId = Auth.getUser()?.id;
  loadInbox();

  // Open conversation from URL param
  const params = new URLSearchParams(window.location.search);
  if (params.get('with')) openConversation(params.get('with'));

  // Auto-send on Enter (Shift+Enter = newline)
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  // Auto-resize textarea
  document.getElementById('msgInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
});

async function loadInbox() {
  const { ok, data } = await apiCall('GET', '/api/messages/inbox');
  const el = document.getElementById('convList');
  if (!ok || !data.conversations?.length) {
    el.innerHTML = `<div style="padding:30px 20px;text-align:center;color:var(--gray-400);font-size:13px;">No conversations yet.<br/>Apply to jobs to start chatting.</div>`;
    return;
  }
  el.innerHTML = data.conversations.map(c => convItem(c)).join('');
}

function convItem(c) {
  const initials = (c.user.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  return `<div class="conv-item ${activeConvId === c.user.id ? 'active' : ''}" onclick="openConversation('${c.user.id}')">
    <div class="conv-avatar">${initials}</div>
    <div class="conv-info">
      <div class="conv-name">${escapeHtml(c.user.name)}</div>
      <div class="conv-preview">${escapeHtml(c.lastMessage || '')}</div>
    </div>
    ${c.unread > 0 ? `<span class="conv-unread">${c.unread}</span>` : ''}
  </div>`;
}

async function openConversation(userId) {
  activeConvId = userId;
  document.getElementById('msgEmpty').style.display = 'none';
  const chatArea = document.getElementById('chatArea');
  chatArea.style.display = 'flex';
  chatArea.style.flexDirection = 'column';
  chatArea.style.flex = '1';

  document.getElementById('chatHeader').innerHTML = `<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>`;
  document.getElementById('chatBody').innerHTML = '';

  await fetchMessages(userId);
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(() => fetchMessages(userId), 5000); // poll every 5s
  loadInbox(); // refresh sidebar
}

async function fetchMessages(userId) {
  const { ok, data } = await apiCall('GET', `/api/messages/${userId}`);
  if (!ok) return;

  // Header
  const other = data.otherUser;
  const role  = other?.role === 'EMPLOYER' ? (other.profile?.companyName || 'Employer') : (other?.profile?.headline || 'Worker');
  document.getElementById('chatHeader').innerHTML = `
    <div>
      <div class="msg-header-name">${escapeHtml(other?.name || 'User')}</div>
      <div class="msg-header-role">${escapeHtml(role)}</div>
    </div>`;

  // Messages
  const body = document.getElementById('chatBody');
  const wasAtBottom = body.scrollHeight - body.scrollTop <= body.clientHeight + 50;

  body.innerHTML = data.messages.map(m => {
    const mine = m.senderId === currentUserId;
    return `<div class="msg-bubble-wrap ${mine ? 'mine' : ''}">
      <div class="msg-bubble ${mine ? 'mine' : 'theirs'}">${escapeHtml(m.content)}</div>
    </div>
    <div class="msg-time ${mine ? '' : 'theirs'}" style="padding:0 4px;">${formatDateTime(m.createdAt)}</div>`;
  }).join('');

  if (wasAtBottom || data.messages.length < 5) body.scrollTop = body.scrollHeight;
}

async function sendMessage() {
  if (!activeConvId) return;
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  const { ok } = await apiCall('POST', `/api/messages/${activeConvId}`, { content });
  btn.disabled = false;

  if (ok) {
    input.value = '';
    input.style.height = 'auto';
    await fetchMessages(activeConvId);
    loadInbox();
  }
}

function formatDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const today = now.toDateString() === d.toDateString();
  if (today) return d.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
}
</script>
</body>
</html>
