<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Construction Jobs in Canada — ConsTradeHire</title>
  <meta name="description" content="Browse hundreds of construction jobs across Canada. Search by trade, location, or province. Estimators, Project Managers, Labourers, Electricians and more." />
  <link rel="canonical" href="https://constradehire.com/jobs.html" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://constradehire.com/jobs.html" />
  <meta property="og:title"       content="Browse Construction Jobs in Canada — ConsTradeHire" />
  <meta property="og:description" content="Hundreds of construction jobs across Canada. Find your next opportunity in the trades." />
  <meta property="og:image"       content="https://constradehire.com/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Construction Jobs Canada — ConsTradeHire" />
  <meta name="twitter:description" content="Browse trade and construction jobs across Canada." />
  <meta name="twitter:image"       content="https://constradehire.com/og-image.png" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f97316" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ConsTradeHire" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .jobs-layout { display:grid; grid-template-columns:260px 1fr; gap:24px; padding:32px 0; }
    @media(max-width:768px){ .jobs-layout{grid-template-columns:1fr;} .filters-panel{display:none;} .filters-panel.open{display:block;} }
    .filter-toggle { display:none; }
    @media(max-width:768px){ .filter-toggle{display:inline-flex;align-items:center;gap:6px;} }
    .filters-panel { background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius-lg); padding:20px; height:fit-content; position:sticky; top:80px; }
    .filters-panel h3 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--gray-500); margin-bottom:14px; }
    .filter-group { margin-bottom:18px; }
    .filter-group label { display:block; font-size:13px; font-weight:600; color:var(--gray-700); margin-bottom:6px; }
    .jobs-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
    .jobs-count { font-size:14px; color:var(--gray-500); }
    .search-hero { background:linear-gradient(135deg,#1e3a5f,#2563eb); padding:28px 0; }
    .search-bar { display:flex; gap:8px; flex-wrap:wrap; }
    .search-bar .form-input { flex:1; min-width:180px; background:#fff; }
    #jobsList { display:flex; flex-direction:column; gap:12px; }
    .job-card .job-desc { font-size:13px; color:var(--gray-500); line-height:1.5; margin:8px 0; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .live-badge { display:inline-block; background:#dcfce7; color:#16a34a; font-size:10px; font-weight:700; padding:2px 7px; border-radius:100px; text-transform:uppercase; letter-spacing:.5px; }
    .quick-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .quick-tag { padding:5px 12px; border-radius:100px; font-size:12px; font-weight:600; background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3); cursor:pointer; transition:all .15s; }
    .quick-tag:hover { background:rgba(255,255,255,.25); }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container nav-inner">
    <a href="/" class="logo">ConsTradeHire</a>
    <div class="nav-links" id="navLinks">
      <a href="/jobs.html">Browse Jobs</a>
      <a href="#" id="navDashboardLink" style="display:none">Dashboard</a>
      <a href="#" id="navLogoutBtn" style="display:none" class="btn btn-ghost">Logout</a>
      <a href="/login.html" id="navLoginBtn" class="btn btn-ghost">Login</a>
      <a href="/register.html" id="navRegisterBtn" class="btn btn-primary">Get Started</a>
    </div>
    <button class="nav-toggle" id="navToggle">&#9776;</button>
  </div>
</nav>

<!-- Search hero -->
<div class="search-hero">
  <div class="container">
    <div class="search-bar" style="margin-bottom:14px;">
      <input class="form-input" id="jobSearch" type="text" placeholder="Job title, skill, keyword..." />
      <input class="form-input" id="jobLocation" type="text" placeholder="City or province" style="max-width:180px;" />
      <button class="btn btn-primary" id="searchBtn" style="background:#fff;color:var(--blue);font-weight:700;">Search</button>
    </div>
    <div class="quick-tags">
      <span class="quick-tag" onclick="quickSearch('Estimator')">Estimator</span>
      <span class="quick-tag" onclick="quickSearch('Project Manager')">Project Manager</span>
      <span class="quick-tag" onclick="quickSearch('Site Supervisor')">Site Supervisor</span>
      <span class="quick-tag" onclick="quickSearch('Carpenter')">Carpenter</span>
      <span class="quick-tag" onclick="quickSearch('Electrician')">Electrician</span>
      <span class="quick-tag" onclick="quickSearch('Plumber')">Plumber</span>
      <span class="quick-tag" onclick="quickSearch('Labourer')">Labourer</span>
      <span class="quick-tag" onclick="quickSearch('Civil Engineer')">Civil Engineer</span>
    </div>
  </div>
</div>

<div class="container">
  <div class="jobs-layout">

    <!-- Filters sidebar -->
    <aside class="filters-panel">
      <h3>Filters</h3>

      <div class="filter-group">
        <label>Job Type</label>
        <select class="form-select" id="jobType">
          <option value="">All Types</option>
          <option>Full-time</option>
          <option>Contract</option>
          <option>Part-time</option>
          <option>Seasonal</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Province</label>
        <select class="form-select" id="jobProvince">
          <option value="">All Provinces</option>
          <option>Ontario</option>
          <option>British Columbia</option>
          <option>Alberta</option>
          <option>Quebec</option>
          <option>Manitoba</option>
          <option>Saskatchewan</option>
          <option>Nova Scotia</option>
          <option>New Brunswick</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Trade / Sector</label>
        <select class="form-select" id="jobSector">
          <option value="">All Sectors</option>
          <optgroup label="Management">
            <option value="Estimator">Estimating</option>
            <option value="Project Manager">Project Management</option>
            <option value="Coordinator">Coordination</option>
            <option value="Superintendent">Superintendent</option>
          </optgroup>
          <optgroup label="Engineering">
            <option value="Civil Engineer">Civil Engineering</option>
            <option value="Structural">Structural</option>
            <option value="Mechanical">Mechanical</option>
            <option value="BIM">BIM / Drafting</option>
            <option value="Quantity Surveyor">Quantity Surveying</option>
          </optgroup>
          <optgroup label="Skilled Trades">
            <option value="Carpenter">Carpentry</option>
            <option value="Electrician">Electrical</option>
            <option value="Plumber">Plumbing</option>
            <option value="HVAC">HVAC</option>
            <option value="Welder">Welding</option>
            <option value="Ironworker">Ironwork</option>
            <option value="Heavy Equipment">Heavy Equipment</option>
            <option value="Crane">Crane Operation</option>
          </optgroup>
          <optgroup label="Other">
            <option value="Safety">Safety / Health</option>
            <option value="Labourer">General Labour</option>
          </optgroup>
        </select>
      </div>

      <div class="filter-group">
        <label>Posted Within</label>
        <select class="form-select" id="jobDatePosted">
          <option value="">Any Time</option>
          <option value="24h">Last 24 Hours</option>
          <option value="7d">Last 7 Days</option>
          <option value="30d">Last 30 Days</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Source</label>
        <select class="form-select" id="jobSource">
          <option value="">All Jobs</option>
          <option value="live">Live (API)</option>
          <option value="posted">Posted Here</option>
        </select>
      </div>

      <button class="btn btn-ghost btn-full btn-sm" id="clearFilters" style="margin-top:4px;">Clear Filters</button>
    </aside>

    <!-- Jobs list -->
    <div>
      <div class="jobs-header">
        <span class="jobs-count" id="jobsCount">Loading jobs...</span>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-ghost btn-sm filter-toggle" onclick="document.querySelector('.filters-panel').classList.toggle('open')">⚙ Filters</button>
          <select class="form-select" style="width:auto;font-size:13px;" id="sortJobs" onchange="loadJobs(1)">
            <option value="newest">Newest First</option>
            <option value="featured">Featured First</option>
          </select>
        </div>
      </div>

      <!-- Live jobs banner -->
      <div id="liveJobsBanner" style="display:none;background:var(--green-light);border:1px solid #bbf7d0;border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;font-size:13px;color:#166534;display:flex;align-items:center;gap:8px;">
        <span>🌐</span> <span id="liveJobsText">Loading live construction jobs...</span>
      </div>

      <div id="jobsList"></div>
      <div id="paginationWrap" style="text-align:center;margin-top:24px;"></div>
    </div>

  </div>
</div>

<script src="/app.js"></script>
<script>
let liveJobs = [];

function quickSearch(term) {
  document.getElementById('jobSearch').value = term;
  loadJobs(1);
}

document.getElementById('clearFilters').addEventListener('click', () => {
  document.getElementById('jobSearch').value      = '';
  document.getElementById('jobLocation').value    = '';
  document.getElementById('jobType').value        = '';
  document.getElementById('jobProvince').value    = '';
  document.getElementById('jobSector').value      = '';
  document.getElementById('jobDatePosted').value  = '';
  document.getElementById('jobSource').value      = '';
  loadJobs(1);
});

document.getElementById('searchBtn').addEventListener('click', () => loadJobs(1));
document.getElementById('jobSearch').addEventListener('keydown', e => { if (e.key === 'Enter') loadJobs(1); });

async function loadJobs(page = 1) {
  const container = document.getElementById('jobsList');
  const countEl   = document.getElementById('jobsCount');
  const pagWrap   = document.getElementById('paginationWrap');
  container.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div></div>';

  const search     = document.getElementById('jobSearch').value.trim();
  const location   = document.getElementById('jobLocation').value.trim();
  const type       = document.getElementById('jobType').value;
  const province   = document.getElementById('jobProvince').value;
  const sector     = document.getElementById('jobSector').value;
  const datePosted = document.getElementById('jobDatePosted').value;
  const source     = document.getElementById('jobSource').value;
  const sort       = document.getElementById('sortJobs').value;

  const query = new URLSearchParams({ page, limit: 20 });
  if (search)     query.set('search', search);
  if (location)   query.set('location', location);
  if (type)       query.set('type', type);
  if (province)   query.set('province', province);
  if (sector)     query.set('sector', sector);
  if (datePosted) query.set('datePosted', datePosted);
  if (sort)       query.set('sort', sort);

  const { ok, data } = await apiCall('GET', `/api/jobs?${query}`);
  if (!ok) {
    container.innerHTML = `<div class="empty-state"><p class="text-gray">${data.error || 'Failed to load jobs'}</p></div>`;
    return;
  }

  let jobs = data.jobs || [];

  // Merge / filter live jobs
  if (source !== 'posted' && liveJobs.length) {
    const sl = search.toLowerCase();
    const tl = type.toLowerCase();
    const pl = province.toLowerCase();
    const sel = sector.toLowerCase();
    let filtered = liveJobs;
    if (search)   filtered = filtered.filter(j => j.title?.toLowerCase().includes(sl) || j.company?.toLowerCase().includes(sl) || j.summary?.toLowerCase().includes(sl));
    if (type)     filtered = filtered.filter(j => j.type?.toLowerCase().includes(tl));
    if (province) filtered = filtered.filter(j => j.location?.toLowerCase().includes(pl));
    if (sector)   filtered = filtered.filter(j => j.title?.toLowerCase().includes(sel) || j.summary?.toLowerCase().includes(sel));
    if (datePosted) {
      const cutoff = datePosted === '24h' ? 1 : datePosted === '7d' ? 7 : 30;
      const since = new Date(Date.now() - cutoff * 24 * 60 * 60 * 1000);
      filtered = filtered.filter(j => j.posted && new Date(j.posted) >= since);
    }
    jobs = source === 'live' ? filtered : [...filtered, ...jobs];
  } else if (source === 'live') {
    jobs = [];
  }

  if (countEl) countEl.textContent = `${(data.pagination?.total || jobs.length).toLocaleString()} jobs found`;

  if (!jobs.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>No jobs found</h3><p>Try different keywords or clear filters</p></div>`;
    pagWrap.innerHTML = '';
    return;
  }

  container.innerHTML = jobs.map(job => jobCard(job)).join('');

  // Inject JSON-LD JobPosting structured data for Google Jobs indexing
  const existing = document.getElementById('jobs-jsonld');
  if (existing) existing.remove();
  const dbJobs = jobs.filter(j => j.id && !j.url);
  if (dbJobs.length) {
    const listings = dbJobs.slice(0, 20).map(j => ({
      '@type': 'JobPosting',
      title: j.title,
      description: j.summary || j.description || j.title,
      hiringOrganization: { '@type': 'Organization', name: j.companyName || j.employer?.name || 'Company' },
      jobLocation: { '@type': 'Place', address: { '@type': 'PostalAddress', addressCountry: 'CA', addressLocality: j.city || j.location || 'Canada' } },
      employmentType: j.jobType || 'FULL_TIME',
      datePosted: (j.postedAt || new Date().toISOString()).split('T')[0],
      url: `https://constradehire.com/jobs.html?id=${j.id}`,
      ...(j.salary ? { baseSalary: { '@type': 'MonetaryAmount', currency: 'CAD', value: j.salary } } : {})
    }));
    const script = document.createElement('script');
    script.type = 'application/ld+json';
    script.id = 'jobs-jsonld';
    script.textContent = JSON.stringify({ '@context': 'https://schema.org', '@graph': listings });
    document.head.appendChild(script);
  }

  // Pagination (DB jobs only)
  const pg = data.pagination;
  if (pg && pg.pages > 1 && source !== 'live') {
    let btns = '';
    for (let i = 1; i <= Math.min(pg.pages, 10); i++) {
      btns += `<button class="btn btn-sm ${i === pg.page ? 'btn-primary' : 'btn-ghost'}" onclick="loadJobs(${i})">${i}</button>`;
    }
    pagWrap.innerHTML = `<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">${btns}</div>`;
  } else {
    pagWrap.innerHTML = '';
  }
}

// ── Saved Jobs (localStorage) ─────────────────
function getSaved() { try { return JSON.parse(localStorage.getItem('ctr_saved')||'[]'); } catch { return []; } }
function isSaved(id) { return getSaved().includes(String(id)); }
function toggleSave(e, id, title) {
  e.preventDefault(); e.stopPropagation();
  const saved = getSaved();
  const idx   = saved.indexOf(String(id));
  if (idx >= 0) saved.splice(idx, 1); else saved.push(String(id));
  localStorage.setItem('ctr_saved', JSON.stringify(saved));
  const btn = document.getElementById(`save-${id}`);
  if (btn) { btn.textContent = idx >= 0 ? '🤍' : '❤️'; btn.title = idx >= 0 ? 'Save job' : 'Saved'; }
}

function jobCard(job) {
  const isLive = !!job.url;
  const href   = isLive ? job.url : `/job.html?id=${job.id}`;
  const target = isLive ? 'target="_blank" rel="noopener"' : '';
  const jobId  = job.id || job.url;
  const saved  = isSaved(jobId);
  return `<div style="position:relative;">
    <a href="${escapeHtml(href)}" ${target} style="text-decoration:none;">
      <div class="job-card">
        <div class="job-card-header">
          <div>
            <div class="job-title">${escapeHtml(job.title)}</div>
            <div class="job-company">
              ${escapeHtml(job.company || job.companyName || job.employer?.name || 'Company')}
              ${job.employer?.isVerified ? `<span title="Verified Employer" style="color:#16a34a;font-size:12px;font-weight:700;margin-left:4px;">✓ Verified</span>` : ''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            ${isLive ? `<span class="live-badge">Live</span>` : ''}
            ${job.isFeatured ? `<span class="badge badge-yellow" style="font-size:10px;">⭐ Featured</span>` : ''}
          </div>
        </div>
        <div class="job-meta">
          ${(job.location||job.city) ? `<span class="job-tag">📍 ${escapeHtml(job.location||job.city)}</span>` : ''}
          ${job.type||job.jobType   ? `<span class="job-tag">🕐 ${escapeHtml(job.type||job.jobType)}</span>` : ''}
          ${job.salary              ? `<span class="job-tag">💰 ${escapeHtml(job.salary)}</span>` : ''}
          ${job.posted||job.postedAt? `<span class="job-tag">📅 ${formatDate(job.posted||job.postedAt)}</span>` : ''}
        </div>
        ${job.summary||job.description ? `<div class="job-desc">${escapeHtml((job.summary||job.description).substring(0,160))}</div>` : ''}
        ${job.skills?.length ? `<div class="kw-tags" style="margin-bottom:6px;">${job.skills.slice(0,5).map(s=>`<span class="kw-tag">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
        <div class="job-footer">
          ${!isLive && job.id ? `<button onclick="event.preventDefault();event.stopPropagation();openReportModal('${job.id}')" style="background:none;border:none;font-size:11px;color:var(--gray-400);cursor:pointer;padding:0;">🚩 Report</button>` : '<span></span>'}
          <span class="btn btn-sm btn-primary">${isLive ? 'View & Apply →' : 'View Job'}</span>
        </div>
      </div>
    </a>
    <button id="save-${jobId}" onclick="toggleSave(event,'${jobId}','${escapeHtml(job.title)}')"
      title="${saved ? 'Saved' : 'Save job'}"
      style="position:absolute;top:14px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;z-index:2;line-height:1;"
    >${saved ? '❤️' : '🤍'}</button>
  </div>`;
}

// Load live jobs from Adzuna cache
async function loadLiveJobs() {
  const banner = document.getElementById('liveJobsBanner');
  banner.style.display = 'flex';
  const { ok, data } = await apiCall('GET', '/api/jobs/live');
  if (ok && data.jobs?.length) {
    liveJobs = data.jobs;
    document.getElementById('liveJobsText').textContent =
      `${data.jobs.length} live construction jobs · Last updated ${formatDate(data.lastSearched)}`;
  } else {
    banner.style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  if (params.get('search'))   document.getElementById('jobSearch').value = params.get('search');
  if (params.get('province')) document.getElementById('jobProvince').value = params.get('province');

  // Auto-detect province via IPstack (only if no province param in URL)
  if (!params.get('province')) {
    try {
      const geo = await fetch('/api/geo').then(r => r.json());
      if (geo.province) {
        const sel = document.getElementById('jobProvince');
        const opt = [...sel.options].find(o =>
          o.value && geo.province.toLowerCase().includes(o.value.toLowerCase())
        );
        if (opt) sel.value = opt.value;
      }
    } catch (_) {}
  }

  await loadLiveJobs();
  loadJobs(1);
});

// ── Report Modal ──────────────────────────────
let _reportJobId = null;
function openReportModal(jobId) {
  _reportJobId = jobId;
  document.getElementById('reportReason').value = 'SPAM';
  document.getElementById('reportDetails').value = '';
  document.getElementById('reportModal').style.display = 'flex';
}
function closeReportModal() {
  document.getElementById('reportModal').style.display = 'none';
  _reportJobId = null;
}
async function submitReport() {
  if (!_reportJobId) return;
  const reason  = document.getElementById('reportReason').value;
  const details = document.getElementById('reportDetails').value.trim();
  const btn = document.getElementById('submitReportBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  const { ok, data } = await apiCall('POST', `/api/jobs/${_reportJobId}/report`, { reason, details });
  if (ok) {
    closeReportModal();
    showToast('Report submitted. Thank you!');
  } else {
    showToast(data?.error || 'Failed to submit report', 'error');
    btn.disabled = false; btn.textContent = 'Submit Report';
  }
}
function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:${type==='error'?'#dc2626':'#16a34a'};color:#fff;
    padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;
    box-shadow:0 4px 12px rgba(0,0,0,.2);`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>

<!-- Report Modal -->
<div id="reportModal" onclick="if(event.target===this)closeReportModal()"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:28px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="margin:0;font-size:18px;">🚩 Report Job</h3>
      <button onclick="closeReportModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;">&times;</button>
    </div>
    <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Reason</label>
    <select id="reportReason" style="width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;margin-bottom:14px;">
      <option value="SPAM">Spam or duplicate</option>
      <option value="SCAM">Scam / fraudulent</option>
      <option value="MISLEADING">Misleading information</option>
      <option value="INAPPROPRIATE">Inappropriate content</option>
      <option value="OTHER">Other</option>
    </select>
    <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Details (optional)</label>
    <textarea id="reportDetails" rows="3" placeholder="Add more details…"
      style="width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;resize:vertical;box-sizing:border-box;margin-bottom:18px;"></textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="closeReportModal()" class="btn btn-ghost">Cancel</button>
      <button id="submitReportBtn" onclick="submitReport()" class="btn btn-primary">Submit Report</button>
    </div>
  </div>
</div>
</body>
</html>
