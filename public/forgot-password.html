<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ConsTradeHire</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { background: var(--gray-50); }
    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }
    .logo { font-size: 22px; font-weight: 800; color: var(--blue); text-decoration: none; margin-bottom: 28px; }
    .card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow-md); }

    .step { display: none; }
    .step.active { display: block; }

    .step-title { font-size: 20px; font-weight: 800; color: var(--gray-900); margin-bottom: 6px; }
    .step-sub   { font-size: 13px; color: var(--gray-500); margin-bottom: 24px; line-height: 1.5; }

    /* OTP input */
    .otp-input {
      font-size: 32px; font-weight: 800; letter-spacing: 10px; text-align: center;
      width: 210px; border: 2px solid var(--gray-300); border-radius: 12px;
      padding: 14px 10px; font-family: monospace; color: var(--gray-900); background: #fff;
      display: block; margin: 0 auto 16px; transition: border-color .2s;
    }
    .otp-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .otp-submit {
      width: 100%; padding: 13px; background: var(--blue); color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 12px;
      transition: background .2s;
    }
    .otp-submit:hover:not(:disabled) { background: #1d4ed8; }
    .otp-submit:disabled { opacity: .6; cursor: not-allowed; }

    .back-btn { font-size: 12px; color: var(--gray-400); background: none; border: none; cursor: pointer; padding: 4px; margin-top: 8px; }
  </style>
</head>
<body>
<div class="page">
  <a href="/" class="logo">ConsTradeHire</a>
  <div class="card">

    <!-- Step 1: Email -->
    <div class="step active" id="step1">
      <div class="step-title">Forgot your password?</div>
      <div class="step-sub">Enter your email and we'll send a 6-digit reset code.</div>

      <div id="step1Error" class="alert alert-error hidden"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="forgotEmail">Email Address</label>
          <input class="form-input" id="forgotEmail" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <button type="submit" class="btn btn-full mt-2" id="forgotBtn"
          style="background:var(--blue);color:#fff;font-size:15px;padding:13px;">
          Send Reset Code
        </button>
      </form>

      <p style="text-align:center;font-size:13px;color:var(--gray-500);margin-top:20px;">
        Remembered it? <a href="/login.html" style="color:var(--blue);font-weight:700;">Back to Login</a>
      </p>
    </div>

    <!-- Step 2: OTP -->
    <div class="step" id="step2">
      <div style="font-size:48px;text-align:center;margin-bottom:12px;">📬</div>
      <div class="step-title" style="text-align:center;">Check your email</div>
      <div class="step-sub" style="text-align:center;">
        We sent a 6-digit code to<br>
        <strong id="otpMaskedEmail" style="color:var(--blue);"></strong>
      </div>

      <div id="step2Error" class="alert alert-error hidden"></div>

      <input id="otpInput" type="text" inputmode="numeric" pattern="[0-9]*"
        maxlength="6" placeholder="000000" class="otp-input" autocomplete="one-time-code" />

      <button id="otpSubmitBtn" class="otp-submit" onclick="verifyOtp()">Verify Code</button>

      <p id="otpTimer" style="font-size:13px;color:var(--gray-500);text-align:center;margin:0 0 6px;"></p>
      <div style="text-align:center;">
        <button id="otpResendBtn" onclick="resendCode()"
          style="font-size:13px;color:var(--gray-400);cursor:not-allowed;background:none;border:none;font-weight:600;padding:4px;" disabled>
          Resend code
        </button>
      </div>
      <div style="text-align:center;">
        <button class="back-btn" onclick="goStep(1)">← Use a different email</button>
      </div>
    </div>

    <!-- Step 3: New Password -->
    <div class="step" id="step3">
      <div style="font-size:48px;text-align:center;margin-bottom:12px;">🔑</div>
      <div class="step-title" style="text-align:center;">Set a new password</div>
      <div class="step-sub" style="text-align:center;">Choose a strong password — at least 8 characters with a letter and number.</div>

      <div id="step3Error" class="alert alert-error hidden"></div>
      <div id="step3Success" class="alert alert-success hidden"></div>

      <form id="resetForm">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div style="position:relative;">
            <input class="form-input" id="newPassword" type="password" placeholder="Minimum 8 characters" required style="padding-right:44px;" autocomplete="new-password" />
            <button type="button" onclick="togglePwd()"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:16px;">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" id="confirmPassword" type="password" placeholder="Repeat password" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-full mt-2" id="resetBtn"
          style="background:var(--blue);color:#fff;font-size:15px;padding:13px;">
          Reset Password
        </button>
      </form>
    </div>

  </div>
</div>

<script src="/app.js?v=2"></script>
<script>
let _email  = '';
let _otp    = '';
let _timerIv   = null;
let _resendIv  = null;

function goStep(n) {
  document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i === n - 1));
}

// ── Step 1: send code ─────────────────────────
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn     = document.getElementById('forgotBtn');
  const errorEl = document.getElementById('step1Error');
  _email = document.getElementById('forgotEmail').value.trim();

  errorEl.classList.add('hidden');
  btn.disabled = true;
  btn.textContent = 'Sending code…';

  const { ok, data } = await apiCall('POST', '/api/auth/forgot-password', { email: _email });

  btn.disabled = false;
  btn.textContent = 'Send Reset Code';

  if (ok || data.requiresOtp) {
    // Show masked email and go to OTP step
    const masked = data.masked || _email;
    document.getElementById('otpMaskedEmail').textContent = masked;
    goStep(2);
    startTimer(10 * 60);
    startResendCooldown(60);
    document.getElementById('otpInput').value = '';
    document.getElementById('otpInput').focus();
  } else {
    errorEl.textContent = data.error || 'Something went wrong. Try again.';
    errorEl.classList.remove('hidden');
  }
});

// ── Step 2: verify OTP ────────────────────────
async function verifyOtp() {
  const input   = document.getElementById('otpInput');
  const errorEl = document.getElementById('step2Error');
  const btn     = document.getElementById('otpSubmitBtn');
  _otp = input.value.trim();

  if (_otp.length !== 6) {
    errorEl.textContent = 'Please enter the 6-digit code';
    errorEl.classList.remove('hidden');
    return;
  }

  errorEl.classList.add('hidden');
  btn.disabled = true;
  btn.textContent = 'Verifying…';
  input.disabled = true;

  // Verify by trying reset with a placeholder — actually just move to step 3
  // (real verification happens on final submit with email+otp+password)
  // Do a lightweight check: call reset-password with a dummy password to validate OTP only
  // Better: just trust the OTP and let step 3 submit reject if wrong
  // We'll validate on final submit — advance to step 3
  clearInterval(_timerIv);
  clearInterval(_resendIv);
  btn.disabled = false;
  btn.textContent = 'Verify Code';
  goStep(3);
  document.getElementById('newPassword').focus();
}

// Auto-strip non-digits, auto-advance when 6 chars entered
document.getElementById('otpInput').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g,'').slice(0,6);
  if (this.value.length === 6) verifyOtp();
});
document.getElementById('otpInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') verifyOtp();
});

// ── Step 3: reset password ────────────────────
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn       = document.getElementById('resetBtn');
  const errorEl   = document.getElementById('step3Error');
  const successEl = document.getElementById('step3Success');
  const password  = document.getElementById('newPassword').value;
  const confirm   = document.getElementById('confirmPassword').value;

  errorEl.classList.add('hidden');

  if (password !== confirm) {
    errorEl.textContent = 'Passwords do not match';
    errorEl.classList.remove('hidden');
    return;
  }
  if (password.length < 8 || !/[a-zA-Z]/.test(password) || !/[0-9]/.test(password)) {
    errorEl.textContent = 'Password must be at least 8 characters with a letter and number';
    errorEl.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Resetting…';

  const { ok, data } = await apiCall('POST', '/api/auth/reset-password', {
    email: _email, otp: _otp, password
  });

  if (ok) {
    document.getElementById('resetForm').style.display = 'none';
    successEl.textContent = 'Password reset! Redirecting to login…';
    successEl.classList.remove('hidden');
    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
  } else {
    errorEl.textContent = data.error || 'Reset failed — please try again';
    errorEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Reset Password';
    // If OTP error, send back to OTP step
    if (data.error && data.error.toLowerCase().includes('code')) {
      setTimeout(() => {
        goStep(2);
        document.getElementById('otpInput').disabled = false;
        document.getElementById('otpInput').value = '';
        document.getElementById('otpInput').focus();
        document.getElementById('otpSubmitBtn').disabled = false;
        document.getElementById('step2Error').textContent = data.error;
        document.getElementById('step2Error').classList.remove('hidden');
        startTimer(10 * 60);
        startResendCooldown(60);
      }, 400);
    }
  }
});

// ── Resend ────────────────────────────────────
async function resendCode() {
  const btn     = document.getElementById('otpResendBtn');
  const errorEl = document.getElementById('step2Error');
  btn.disabled = true;

  const { ok, data } = await apiCall('POST', '/api/auth/resend-otp', {
    email: _email, purpose: 'RESET_PASSWORD'
  });

  if (ok) {
    errorEl.classList.add('hidden');
    Toast.success('New code sent — check your email.');
    document.getElementById('otpInput').disabled = false;
    document.getElementById('otpInput').value = '';
    document.getElementById('otpInput').focus();
    document.getElementById('otpSubmitBtn').disabled = false;
    startTimer(10 * 60);
    startResendCooldown(60);
  } else {
    errorEl.textContent = data.error || 'Failed to resend. Try again.';
    errorEl.classList.remove('hidden');
    btn.disabled = false;
  }
}

// ── Timer helpers ─────────────────────────────
function startTimer(seconds) {
  clearInterval(_timerIv);
  let rem = seconds;
  const el = document.getElementById('otpTimer');
  const inp = document.getElementById('otpInput');
  const sub = document.getElementById('otpSubmitBtn');
  const update = () => {
    if (!el) return;
    if (rem <= 0) {
      clearInterval(_timerIv);
      el.textContent = 'Code expired — request a new one.';
      el.style.color = '#ef4444';
      if (inp) inp.disabled = true;
      if (sub) sub.disabled = true;
      return;
    }
    const m = String(Math.floor(rem/60)).padStart(2,'0');
    const s = String(rem%60).padStart(2,'0');
    el.textContent = `Expires in ${m}:${s}`;
    el.style.color = rem < 60 ? '#ef4444' : '';
    rem--;
  };
  update();
  _timerIv = setInterval(update, 1000);
}

function startResendCooldown(seconds) {
  clearInterval(_resendIv);
  let rem = seconds;
  const btn = document.getElementById('otpResendBtn');
  if (!btn) return;
  btn.disabled = true;
  btn.style.cssText = 'font-size:13px;color:var(--gray-400);cursor:not-allowed;background:none;border:none;font-weight:600;padding:4px;';
  const update = () => {
    if (rem <= 0) {
      clearInterval(_resendIv);
      btn.disabled = false;
      btn.style.cssText = 'font-size:13px;color:var(--blue);cursor:pointer;background:none;border:none;font-weight:600;padding:4px;';
      btn.textContent = 'Resend code';
      return;
    }
    btn.textContent = `Resend code (${rem}s)`;
    rem--;
  };
  update();
  _resendIv = setInterval(update, 1000);
}

function togglePwd() {
  const inp = document.getElementById('newPassword');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
