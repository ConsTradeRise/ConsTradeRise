<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — ConsTradeHire</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { background: var(--gray-50); }
    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }
    .logo { font-size: 22px; font-weight: 800; color: var(--blue); text-decoration: none; margin-bottom: 28px; }
    .card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow-md); }
    .card-title { font-size: 20px; font-weight: 800; color: var(--gray-900); margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: var(--gray-500); margin-bottom: 24px; }
  </style>
</head>
<body>
<div class="page">
  <a href="/" class="logo">ConsTradeHire</a>
  <div class="card">
    <div class="card-title">Forgot your password?</div>
    <div class="card-sub">Enter your email and we'll send a reset link.</div>

    <div id="forgotError"  class="alert alert-error  hidden"></div>
    <div id="forgotSuccess" class="alert alert-success hidden"></div>

    <form id="forgotForm">
      <div class="form-group">
        <label class="form-label" for="forgotEmail">Email Address</label>
        <input class="form-input" id="forgotEmail" type="email" placeholder="you@example.com" required />
      </div>
      <button type="submit" class="btn btn-full mt-2" id="forgotBtn" style="background:var(--blue);color:#fff;font-size:15px;padding:13px;">
        Send Reset Link
      </button>
    </form>

    <p style="text-align:center;font-size:13px;color:var(--gray-500);margin-top:20px;">
      Remembered it? <a href="/login.html" style="color:var(--blue);font-weight:700;">Back to Login</a>
    </p>
  </div>
</div>

<script src="/app.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn       = document.getElementById('forgotBtn');
  const errorEl   = document.getElementById('forgotError');
  const successEl = document.getElementById('forgotSuccess');
  const email     = document.getElementById('forgotEmail').value.trim();

  errorEl.classList.add('hidden');
  successEl.classList.add('hidden');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  const { ok, data } = await apiCall('POST', '/api/auth/forgot-password', { email });

  if (ok) {
    successEl.textContent = data.message;
    successEl.classList.remove('hidden');
    document.getElementById('forgotForm').style.display = 'none';
  } else {
    errorEl.textContent = data.error || 'Something went wrong';
    errorEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
});
</script>
</body>
</html>
