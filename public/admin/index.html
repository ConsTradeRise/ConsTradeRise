<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — ConsTradeHire</title>
  <script>
    if (!localStorage.getItem('adminToken')) {
      window.location.replace('/admin/login.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090f;
      --surface: #13131f;
      --surface2: #1a1a2e;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --orange: #f97316;
      --orange-dim: rgba(249,115,22,0.12);
      --orange-glow: rgba(249,115,22,0.25);
      --red: #ef4444;
      --green: #22c55e;
      --blue: #3b82f6;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --text-sub: #94a3b8;
      --radius: 14px;
      --radius-sm: 8px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(9,9,15,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-logo { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.4px; }
    .topbar-logo span { color: var(--orange); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .admin-badge {
      font-size: 11px; font-weight: 700; color: var(--orange);
      background: var(--orange-dim); border: 1px solid rgba(249,115,22,0.2);
      border-radius: 20px; padding: 3px 10px;
    }
    .btn-logout {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 6px 12px; cursor: pointer; font-family: var(--font);
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* ── Layout ── */
    .layout { display: flex; min-height: calc(100vh - 60px); }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 20px 12px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted);
      transition: background 0.15s, color 0.15s; margin-bottom: 2px; border: none;
      background: none; width: 100%; text-align: left; font-family: var(--font);
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text-sub); }
    .nav-item.active { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(249,115,22,0.15); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    /* ── Main ── */
    .main { flex: 1; padding: 28px 24px; overflow-x: hidden; }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
    }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--text); }
    .stat-icon  { font-size: 22px; margin-bottom: 8px; }

    /* ── Section header ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .section-title { font-size: 16px; font-weight: 800; color: var(--text); }

    /* ── Search/filter row ── */
    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .search-input {
      flex: 1; min-width: 200px; padding: 9px 14px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--orange); }
    .filter-select {
      padding: 9px 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 13px;
      outline: none; cursor: pointer;
    }
    .filter-select option { background: var(--surface); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--surface2); }
    th {
      padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text-sub); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    /* ── Badges ── */
    .badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px;
    }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }
    .badge-green  { background: rgba(34,197,94,0.12); color: var(--green); }
    .badge-red    { background: rgba(239,68,68,0.12); color: var(--red); }
    .badge-blue   { background: rgba(59,130,246,0.12); color: var(--blue); }
    .badge-gray   { background: rgba(255,255,255,0.06); color: var(--text-muted); }

    /* ── Action buttons ── */
    .action-btn {
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px;
      border: 1px solid transparent; cursor: pointer; font-family: var(--font);
      transition: all 0.15s; margin-right: 4px; margin-bottom: 2px;
    }
    .action-btn-red    { border-color: rgba(239,68,68,0.3); color: var(--red); background: rgba(239,68,68,0.08); }
    .action-btn-red:hover { background: rgba(239,68,68,0.18); }
    .action-btn-orange { border-color: rgba(249,115,22,0.3); color: var(--orange); background: rgba(249,115,22,0.08); }
    .action-btn-orange:hover { background: rgba(249,115,22,0.18); }
    .action-btn-green  { border-color: rgba(34,197,94,0.3); color: var(--green); background: rgba(34,197,94,0.08); }
    .action-btn-green:hover { background: rgba(34,197,94,0.18); }
    .action-btn-blue   { border-color: rgba(59,130,246,0.3); color: var(--blue); background: rgba(59,130,246,0.08); }
    .action-btn-blue:hover { background: rgba(59,130,246,0.18); }

    /* ── Pagination ── */
    .pagination { display: flex; align-items: center; gap: 8px; margin-top: 16px; justify-content: center; }
    .page-btn {
      padding: 6px 14px; font-size: 12px; font-weight: 600; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: rgba(255,255,255,0.04);
      color: var(--text-sub); cursor: pointer; font-family: var(--font); transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-size: 12px; color: var(--text-muted); }

    /* ── Empty / Loading ── */
    .empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 13px; }
    .loading { padding: 40px; text-align: center; color: var(--text-muted); font-size: 13px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 12px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
      animation: slideIn 0.2s ease;
    }
    .toast-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .toast-error   { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-logo">ConsTradeHire<span>.</span></div>
  <div class="topbar-right">
    <span class="admin-badge">ADMIN</span>
    <span id="adminName" style="font-size:13px;color:var(--text-sub);"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <button class="nav-item active" id="nav-stats"    onclick="showTab('stats')">   <span class="nav-icon">📊</span> Stats</button>
    <button class="nav-item"        id="nav-users"    onclick="showTab('users')">   <span class="nav-icon">👥</span> Users</button>
    <button class="nav-item"        id="nav-jobs"     onclick="showTab('jobs')">    <span class="nav-icon">💼</span> Jobs</button>
    <button class="nav-item"        id="nav-apps"     onclick="showTab('apps')">    <span class="nav-icon">📋</span> Applications</button>
    <button class="nav-item"        id="nav-reports"  onclick="showTab('reports')"> <span class="nav-icon">🚩</span> Reports</button>
  </nav>

  <!-- Main content -->
  <main class="main">

    <!-- ── Stats ── -->
    <div class="tab-panel active" id="panel-stats">
      <div class="section-header">
        <div class="section-title">Platform Overview</div>
        <button class="page-btn" onclick="loadStats()">Refresh</button>
      </div>
      <div class="stats-grid" id="statsGrid">
        <div class="loading">Loading stats…</div>
      </div>

      <div class="section-header" style="margin-top:28px;">
        <div class="section-title">Job Scraper — Construction Companies</div>
        <button class="page-btn action-btn-red" id="purgeBtn" onclick="purgeTruncated()" style="margin-right:8px;">Purge Truncated</button>
        <button class="page-btn" id="scrapeBtn" onclick="runScrape()">Run Scrape</button>
      </div>
      <div id="scrapeStatus" style="font-size:13px;color:var(--text-sub);margin-bottom:8px;">
        Scrapes Adzuna for jobs at PCL, EllisDon, Aecon, Graham, Bird, Ledcor, Pomerleau and 30+ more.
      </div>
      <div id="scrapeResults" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:13px;"></div>
    </div>

    <!-- ── Users ── -->
    <div class="tab-panel" id="panel-users">
      <div class="section-header">
        <div class="section-title">Users</div>
      </div>
      <div class="filter-row">
        <input class="search-input" id="userSearch" type="text" placeholder="Search name or email…" oninput="debounce(loadUsers, 400)()" />
        <select class="filter-select" id="userRole" onchange="loadUsers()">
          <option value="">All roles</option>
          <option value="WORKER">Job Seekers</option>
          <option value="EMPLOYER">Employers</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
      <div class="table-wrap" id="usersTable"><div class="loading">Loading…</div></div>
      <div class="pagination" id="usersPagination"></div>
    </div>

    <!-- ── Jobs ── -->
    <div class="tab-panel" id="panel-jobs">
      <div class="section-header">
        <div class="section-title">Jobs</div>
      </div>
      <div class="filter-row">
        <input class="search-input" id="jobSearch" type="text" placeholder="Search title or location…" oninput="debounce(loadJobs, 400)()" />
      </div>
      <div class="table-wrap" id="jobsTable"><div class="loading">Loading…</div></div>
      <div class="pagination" id="jobsPagination"></div>
    </div>

    <!-- ── Applications ── -->
    <div class="tab-panel" id="panel-apps">
      <div class="section-header">
        <div class="section-title">Applications</div>
      </div>
      <div class="table-wrap" id="appsTable"><div class="loading">Loading…</div></div>
      <div class="pagination" id="appsPagination"></div>
    </div>

    <!-- ── Reports ── -->
    <div class="tab-panel" id="panel-reports">
      <div class="section-header">
        <div class="section-title">Job Reports</div>
      </div>
      <div class="filter-row">
        <select class="filter-select" id="reportFilter" onchange="loadReports()">
          <option value="">All</option>
          <option value="false">Pending</option>
          <option value="true">Resolved</option>
        </select>
      </div>
      <div class="table-wrap" id="reportsTable"><div class="loading">Loading…</div></div>
      <div class="pagination" id="reportsPagination"></div>
    </div>

  </main>
</div>

<script>
var TOKEN = localStorage.getItem('adminToken') || '';
var _usersPage = 1, _jobsPage = 1, _appsPage = 1, _reportsPage = 1;

// ── Debounce ──────────────────────────────────────
var _debTimers = {};
function debounce(fn, ms) {
  return function() {
    clearTimeout(_debTimers[fn]);
    _debTimers[fn] = setTimeout(fn, ms);
  };
}

// ── Auth helpers ──────────────────────────────────
function logout() {
  localStorage.removeItem('adminToken');
  localStorage.removeItem('adminName');
  window.location.href = '/admin/login.html';
}

// ── API ───────────────────────────────────────────
async function api(method, path, body) {
  try {
    var opts = {
      method: method,
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN }
    };
    if (body) opts.body = JSON.stringify(body);
    var res = await fetch('/api/admin' + path, opts);
    var data = await res.json();
    return { ok: res.ok, status: res.status, data: data };
  } catch (e) {
    return { ok: false, data: { error: e.message } };
  }
}

// ── Toast ─────────────────────────────────────────
function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast toast-' + (type || 'success');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

// ── DOM helpers ───────────────────────────────────
function mk(tag, cls, text) {
  var el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text !== undefined) el.textContent = text;
  return el;
}
function mkBadge(text, cls) {
  return mk('span', 'badge badge-' + cls, text);
}
function mkBtn(label, cls, onClick) {
  var btn = mk('button', 'action-btn action-btn-' + cls, label);
  btn.onclick = onClick;
  return btn;
}

// ── Tab navigation ────────────────────────────────
var TABS = ['stats', 'users', 'jobs', 'apps', 'reports'];
function showTab(name) {
  TABS.forEach(function(t) {
    document.getElementById('panel-' + t).classList.toggle('active', t === name);
    document.getElementById('nav-' + t).classList.toggle('active', t === name);
  });
  if (name === 'stats')   loadStats();
  if (name === 'users')   { _usersPage = 1; loadUsers(); }
  if (name === 'jobs')    { _jobsPage = 1; loadJobs(); }
  if (name === 'apps')    { _appsPage = 1; loadApps(); }
  if (name === 'reports') { _reportsPage = 1; loadReports(); }
}

// ── Stats ─────────────────────────────────────────
async function loadStats() {
  var res = await api('GET', '/stats');
  var grid = document.getElementById('statsGrid');
  grid.textContent = '';
  if (!res.ok) { grid.textContent = 'Failed to load stats.'; return; }
  var d = res.data;
  var items = [
    { icon: '👥', label: 'Total Users',    value: d.users },
    { icon: '👷', label: 'Job Seekers',    value: d.workers },
    { icon: '🏢', label: 'Employers',      value: d.employers },
    { icon: '💼', label: 'Total Jobs',     value: d.jobs },
    { icon: '✅', label: 'Active Jobs',    value: d.activeJobs },
    { icon: '📋', label: 'Applications',   value: d.applications },
    { icon: '💬', label: 'Messages',       value: d.messages },
  ];
  items.forEach(function(item) {
    var card = mk('div', 'stat-card');
    card.appendChild(mk('div', 'stat-icon', item.icon));
    card.appendChild(mk('div', 'stat-label', item.label));
    card.appendChild(mk('div', 'stat-value', String(item.value)));
    grid.appendChild(card);
  });
}

// ── Users ─────────────────────────────────────────
async function loadUsers() {
  var search = document.getElementById('userSearch').value;
  var role   = document.getElementById('userRole').value;
  var qs = '?page=' + _usersPage + '&search=' + encodeURIComponent(search) + '&role=' + role;
  var res = await api('GET', '/users' + qs);
  var wrap = document.getElementById('usersTable');
  wrap.textContent = '';
  if (!res.ok) { wrap.textContent = 'Failed to load users.'; return; }

  var d = res.data;
  if (!d.users.length) { wrap.appendChild(mk('div', 'empty', 'No users found.')); return; }

  var table = document.createElement('table');
  var thead = document.createElement('thead');
  var hr = document.createElement('tr');
  ['Name', 'Email', 'Role', 'Status', 'Apps', 'Jobs', 'Joined', 'Actions'].forEach(function(h) {
    hr.appendChild(mk('th', null, h));
  });
  thead.appendChild(hr);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  d.users.forEach(function(u) {
    var row = document.createElement('tr');

    var nameTd = document.createElement('td');
    nameTd.style.color = 'var(--text)';
    nameTd.style.fontWeight = '600';
    nameTd.textContent = u.name;
    row.appendChild(nameTd);

    row.appendChild(mk('td', null, u.email));

    var roleTd = document.createElement('td');
    var roleColor = u.role === 'ADMIN' ? 'orange' : u.role === 'EMPLOYER' ? 'blue' : 'green';
    roleTd.appendChild(mkBadge(u.role, roleColor));
    row.appendChild(roleTd);

    var statusTd = document.createElement('td');
    var isBanned = u.name.startsWith('[BANNED]');
    statusTd.appendChild(mkBadge(isBanned ? 'Banned' : u.emailVerified ? 'Active' : 'Unverified', isBanned ? 'red' : u.emailVerified ? 'green' : 'gray'));
    if (u.isVerified) { statusTd.appendChild(document.createTextNode(' ')); statusTd.appendChild(mkBadge('Verified', 'blue')); }
    row.appendChild(statusTd);

    row.appendChild(mk('td', null, String(u._count.applications)));
    row.appendChild(mk('td', null, String(u._count.postedJobs)));
    row.appendChild(mk('td', null, new Date(u.createdAt).toLocaleDateString()));

    var actTd = document.createElement('td');
    if (u.role !== 'ADMIN') {
      var banLabel = isBanned ? 'Unban' : 'Ban';
      actTd.appendChild(mkBtn(banLabel, isBanned ? 'green' : 'orange', function(uid) { return function() { banUser(uid); }; }(u.id)));
      if (u.role === 'EMPLOYER') {
        var verLabel = u.isVerified ? 'Unverify' : 'Verify';
        actTd.appendChild(mkBtn(verLabel, 'blue', function(uid) { return function() { verifyUser(uid); }; }(u.id)));
      }
      actTd.appendChild(mkBtn('Delete', 'red', function(uid, uname) { return function() { deleteUser(uid, uname); }; }(u.id, u.name)));
    }
    row.appendChild(actTd);
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  renderPagination('usersPagination', _usersPage, d.pages, function(p) { _usersPage = p; loadUsers(); });
}

async function banUser(id) {
  var res = await api('PUT', '/users/' + id + '/ban');
  if (res.ok) { toast(res.data.banned ? 'User banned.' : 'User unbanned.'); loadUsers(); }
  else toast(res.data.error || 'Failed.', 'error');
}
async function verifyUser(id) {
  var res = await api('PUT', '/users/' + id + '/verify');
  if (res.ok) { toast(res.data.isVerified ? 'Employer verified.' : 'Verification removed.'); loadUsers(); }
  else toast(res.data.error || 'Failed.', 'error');
}
async function deleteUser(id, name) {
  if (!confirm('Delete user "' + name + '"? This cannot be undone.')) return;
  var res = await api('DELETE', '/users/' + id);
  if (res.ok) { toast('User deleted.'); loadUsers(); }
  else toast(res.data.error || 'Failed.', 'error');
}

// ── Jobs ──────────────────────────────────────────
async function loadJobs() {
  var search = document.getElementById('jobSearch').value;
  var qs = '?page=' + _jobsPage + '&search=' + encodeURIComponent(search);
  var res = await api('GET', '/jobs' + qs);
  var wrap = document.getElementById('jobsTable');
  wrap.textContent = '';
  if (!res.ok) { wrap.textContent = 'Failed to load jobs.'; return; }

  var d = res.data;
  if (!d.jobs.length) { wrap.appendChild(mk('div', 'empty', 'No jobs found.')); return; }

  var table = document.createElement('table');
  var thead = document.createElement('thead');
  var hr = document.createElement('tr');
  ['Title', 'Company', 'Location', 'Type', 'Status', 'Apps', 'Actions'].forEach(function(h) { hr.appendChild(mk('th', null, h)); });
  thead.appendChild(hr);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  d.jobs.forEach(function(j) {
    var row = document.createElement('tr');
    var titleTd = mk('td', null, j.title);
    titleTd.style.color = 'var(--text)'; titleTd.style.fontWeight = '600';
    row.appendChild(titleTd);
    row.appendChild(mk('td', null, j.companyName || (j.employer ? j.employer.name : '—')));
    row.appendChild(mk('td', null, j.location || '—'));
    var typeTd = document.createElement('td');
    typeTd.appendChild(mkBadge(j.jobType || 'N/A', 'gray'));
    row.appendChild(typeTd);
    var statusTd = document.createElement('td');
    statusTd.appendChild(mkBadge(j.isActive ? 'Active' : 'Inactive', j.isActive ? 'green' : 'red'));
    if (j.isFeatured) { statusTd.appendChild(document.createTextNode(' ')); statusTd.appendChild(mkBadge('Featured', 'orange')); }
    row.appendChild(statusTd);
    row.appendChild(mk('td', null, String(j._count.applications)));
    var actTd = document.createElement('td');
    var toggleLabel = j.isActive ? 'Deactivate' : 'Activate';
    actTd.appendChild(mkBtn(toggleLabel, j.isActive ? 'orange' : 'green', function(jid) { return function() { toggleJob(jid); }; }(j.id)));
    actTd.appendChild(mkBtn('Delete', 'red', function(jid, jtitle) { return function() { deleteJob(jid, jtitle); }; }(j.id, j.title)));
    row.appendChild(actTd);
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  renderPagination('jobsPagination', _jobsPage, d.pages, function(p) { _jobsPage = p; loadJobs(); });
}

async function toggleJob(id) {
  var res = await api('PUT', '/jobs/' + id + '/toggle');
  if (res.ok) { toast(res.data.isActive ? 'Job activated.' : 'Job deactivated.'); loadJobs(); }
  else toast(res.data.error || 'Failed.', 'error');
}
async function deleteJob(id, title) {
  if (!confirm('Delete job "' + title + '"? This cannot be undone.')) return;
  var res = await api('DELETE', '/jobs/' + id);
  if (res.ok) { toast('Job deleted.'); loadJobs(); }
  else toast(res.data.error || 'Failed.', 'error');
}

// ── Applications ──────────────────────────────────
async function loadApps() {
  var res = await api('GET', '/applications?page=' + _appsPage);
  var wrap = document.getElementById('appsTable');
  wrap.textContent = '';
  if (!res.ok) { wrap.textContent = 'Failed to load applications.'; return; }

  var d = res.data;
  if (!d.applications.length) { wrap.appendChild(mk('div', 'empty', 'No applications found.')); return; }

  var table = document.createElement('table');
  var thead = document.createElement('thead');
  var hr = document.createElement('tr');
  ['Applicant', 'Email', 'Job', 'Company', 'Status', 'Applied'].forEach(function(h) { hr.appendChild(mk('th', null, h)); });
  thead.appendChild(hr);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  d.applications.forEach(function(a) {
    var row = document.createElement('tr');
    var nameTd = mk('td', null, a.user ? a.user.name : '—');
    nameTd.style.color = 'var(--text)'; nameTd.style.fontWeight = '600';
    row.appendChild(nameTd);
    row.appendChild(mk('td', null, a.user ? a.user.email : '—'));
    row.appendChild(mk('td', null, a.job ? a.job.title : '—'));
    row.appendChild(mk('td', null, a.job ? a.job.companyName : '—'));
    var statusTd = document.createElement('td');
    var sc = { PENDING: 'gray', REVIEWED: 'blue', SHORTLISTED: 'orange', REJECTED: 'red', HIRED: 'green' };
    statusTd.appendChild(mkBadge(a.status, sc[a.status] || 'gray'));
    row.appendChild(statusTd);
    row.appendChild(mk('td', null, new Date(a.appliedAt).toLocaleDateString()));
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  renderPagination('appsPagination', _appsPage, d.pages, function(p) { _appsPage = p; loadApps(); });
}

// ── Reports ───────────────────────────────────────
async function loadReports() {
  var filter = document.getElementById('reportFilter').value;
  var qs = '?page=' + _reportsPage + (filter !== '' ? '&resolved=' + filter : '');
  var res = await api('GET', '/reports' + qs);
  var wrap = document.getElementById('reportsTable');
  wrap.textContent = '';
  if (!res.ok) { wrap.textContent = 'Failed to load reports.'; return; }

  var d = res.data;
  if (!d.reports.length) { wrap.appendChild(mk('div', 'empty', 'No reports found.')); return; }

  var table = document.createElement('table');
  var thead = document.createElement('thead');
  var hr = document.createElement('tr');
  ['Reporter', 'Job ID', 'Reason', 'Status', 'Date', 'Actions'].forEach(function(h) { hr.appendChild(mk('th', null, h)); });
  thead.appendChild(hr);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  d.reports.forEach(function(r) {
    var row = document.createElement('tr');
    row.appendChild(mk('td', null, r.user ? r.user.name : '—'));
    var idTd = mk('td', null, r.jobId ? r.jobId.slice(0, 8) + '…' : '—');
    idTd.title = r.jobId || '';
    row.appendChild(idTd);
    var reasonTd = mk('td', null, r.reason || '—');
    reasonTd.style.maxWidth = '200px'; reasonTd.style.overflow = 'hidden'; reasonTd.style.textOverflow = 'ellipsis'; reasonTd.style.whiteSpace = 'nowrap';
    row.appendChild(reasonTd);
    var statusTd = document.createElement('td');
    statusTd.appendChild(mkBadge(r.resolved ? 'Resolved' : 'Pending', r.resolved ? 'green' : 'orange'));
    row.appendChild(statusTd);
    row.appendChild(mk('td', null, new Date(r.createdAt).toLocaleDateString()));
    var actTd = document.createElement('td');
    if (!r.resolved) {
      actTd.appendChild(mkBtn('Resolve', 'green', function(rid) { return function() { resolveReport(rid); }; }(r.id)));
    }
    row.appendChild(actTd);
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  renderPagination('reportsPagination', _reportsPage, d.pages, function(p) { _reportsPage = p; loadReports(); });
}

async function resolveReport(id) {
  var res = await api('PUT', '/reports/' + id + '/resolve');
  if (res.ok) { toast('Report resolved.'); loadReports(); }
  else toast(res.data.error || 'Failed.', 'error');
}

// ── Pagination ────────────────────────────────────
function renderPagination(elId, page, pages, onPage) {
  var wrap = document.getElementById(elId);
  wrap.textContent = '';
  if (pages <= 1) return;

  var prev = mk('button', 'page-btn', '← Prev');
  prev.disabled = page <= 1;
  prev.onclick = function() { onPage(page - 1); };
  wrap.appendChild(prev);

  var info = mk('span', 'page-info', 'Page ' + page + ' of ' + pages);
  wrap.appendChild(info);

  var next = mk('button', 'page-btn', 'Next →');
  next.disabled = page >= pages;
  next.onclick = function() { onPage(page + 1); };
  wrap.appendChild(next);
}

// ── Purge truncated descriptions ──────────────────
async function purgeTruncated() {
  var btn = document.getElementById('purgeBtn');
  var status = document.getElementById('scrapeStatus');
  if (!confirm('Delete all API jobs with descriptions ≤300 chars so they can be re-imported fresh?')) return;
  btn.disabled = true;
  btn.textContent = 'Purging…';
  status.textContent = 'Deleting truncated jobs…';
  var res = await api('DELETE', '/purge-truncated');
  btn.disabled = false;
  btn.textContent = 'Purge Truncated';
  if (res.ok) {
    status.textContent = 'Deleted ' + res.data.deleted + ' truncated jobs. Now click Run Scrape to re-import with full descriptions.';
  } else {
    status.textContent = 'Error: ' + (res.data?.error || 'Purge failed');
  }
}

// ── Company Job Scraper ───────────────────────────
async function runScrape() {
  var btn = document.getElementById('scrapeBtn');
  var status = document.getElementById('scrapeStatus');
  var results = document.getElementById('scrapeResults');
  btn.disabled = true;
  btn.textContent = 'Scraping…';
  status.textContent = 'Running — this takes ~30 seconds, querying Adzuna for each company…';
  results.style.display = 'none';

  var res = await api('POST', '/scrape-companies');
  btn.disabled = false;
  btn.textContent = 'Run Scrape';

  if (!res.ok) {
    status.textContent = 'Error: ' + (res.data?.error || 'Scrape failed');
    return;
  }

  var d = res.data;
  status.textContent = 'Done — ' + d.added + ' new jobs added, ' + d.skipped + ' duplicates skipped.';
  results.style.display = 'block';
  results.textContent = '';

  var summary = document.createElement('div');
  summary.style.cssText = 'font-weight:700;margin-bottom:10px;color:var(--green)';
  summary.textContent = '+' + d.added + ' jobs added across ' + (d.companies || []).filter(function(c) { return c.added > 0; }).length + ' companies';
  results.appendChild(summary);

  (d.companies || []).forEach(function(c) {
    if (c.found === 0) return;
    var row = document.createElement('div');
    row.style.cssText = 'padding:4px 0;border-bottom:1px solid var(--border);';
    row.textContent = c.company + ' — ' + c.found + ' found, ' + c.added + ' added';
    results.appendChild(row);
  });

  if (d.errors && d.errors.length) {
    var errTitle = document.createElement('div');
    errTitle.style.cssText = 'margin-top:10px;font-weight:700;color:var(--red)';
    errTitle.textContent = 'Errors (' + d.errors.length + ')';
    results.appendChild(errTitle);
    d.errors.forEach(function(e) {
      var row = document.createElement('div');
      row.style.cssText = 'color:var(--red);font-size:12px;';
      row.textContent = e.company + ': ' + e.error;
      results.appendChild(row);
    });
  }
}

// ── Init ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var name = localStorage.getItem('adminName');
  if (name) document.getElementById('adminName').textContent = name;
  loadStats();
});
</script>
