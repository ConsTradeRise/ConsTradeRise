<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ConsTradeHire</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { background: var(--gray-50); }
    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }
    .logo { font-size: 22px; font-weight: 800; color: var(--blue); text-decoration: none; margin-bottom: 28px; }
    .card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow-md); }
    .card-title { font-size: 20px; font-weight: 800; color: var(--gray-900); margin-bottom: 6px; }
    .card-sub   { font-size: 13px; color: var(--gray-500); margin-bottom: 24px; }
  </style>
</head>
<body>
<div class="page">
  <a href="/" class="logo">ConsTradeHire</a>
  <div class="card">
    <div class="card-title">Set a new password</div>
    <div class="card-sub">Choose a strong password — at least 8 characters with a letter and number.</div>

    <div id="resetError"   class="alert alert-error   hidden"></div>
    <div id="resetSuccess" class="alert alert-success hidden"></div>

    <form id="resetForm">
      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <div style="position:relative;">
          <input class="form-input" id="newPassword" type="password" placeholder="Minimum 8 characters" required style="padding-right:44px;" />
          <button type="button" onclick="togglePwd('newPassword','eyeNew')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:16px;" id="eyeNew">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input class="form-input" id="confirmPassword" type="password" placeholder="Repeat password" required />
      </div>
      <button type="submit" class="btn btn-full mt-2" id="resetBtn" style="background:var(--blue);color:#fff;font-size:15px;padding:13px;">
        Reset Password
      </button>
    </form>
  </div>
</div>

<script src="/app.js?v=2"></script>
<script>
function togglePwd(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('resetForm').style.display = 'none';
  const err = document.getElementById('resetError');
  err.textContent = 'Invalid or missing reset token. Please request a new link.';
  err.classList.remove('hidden');
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn       = document.getElementById('resetBtn');
  const errorEl   = document.getElementById('resetError');
  const successEl = document.getElementById('resetSuccess');
  const password  = document.getElementById('newPassword').value;
  const confirm   = document.getElementById('confirmPassword').value;

  errorEl.classList.add('hidden');

  if (password !== confirm) {
    errorEl.textContent = 'Passwords do not match';
    errorEl.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Resetting...';

  const { ok, data } = await apiCall('POST', '/api/auth/reset-password', { token, password });

  if (ok) {
    successEl.textContent = data.message + ' Redirecting to login...';
    successEl.classList.remove('hidden');
    document.getElementById('resetForm').style.display = 'none';
    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
  } else {
    errorEl.textContent = data.error || 'Reset failed';
    errorEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
});
</script>
</body>
</html>
