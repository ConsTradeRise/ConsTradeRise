<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ConsTradeHire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090f;
      --border: rgba(255,255,255,0.07);
      --orange: #f97316;
      --orange-glow: rgba(249,115,22,0.25);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --text-sub: #94a3b8;
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(249,115,22,0.07) 0%, transparent 70%),
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 100% 100%, 64px 64px, 64px 64px;
    }
    .page {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px 16px;
    }
    .logo {
      font-size: 22px; font-weight: 800; color: var(--text);
      text-decoration: none; margin-bottom: 32px;
      display: flex; align-items: center; gap: 8px; letter-spacing: -0.5px;
    }
    .logo-dot { color: var(--orange); }
    .card {
      background: rgba(19,19,31,0.8); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; width: 100%; max-width: 420px;
      backdrop-filter: blur(24px); box-shadow: 0 0 60px rgba(0,0,0,0.5);
      text-align: center;
    }
    .icon { font-size: 44px; margin-bottom: 14px; }
    .title { font-size: 19px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
    .btn-primary {
      display: inline-block; padding: 12px 28px;
      background: var(--orange); color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700; font-family: var(--font);
      cursor: pointer; text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover { background: #ea6c0e; box-shadow: 0 0 24px var(--orange-glow); }
  </style>
</head>
<body>
<div class="page">
  <a href="/" class="logo"><span>ConsTradeHire</span><span class="logo-dot">.</span></a>
  <div class="card">
    <div class="icon">🔑</div>
    <div class="title">Password reset has moved</div>
    <div class="sub">We now use a secure 6-digit code instead of email links.<br>Redirecting you now…</div>
    <a href="/forgot-password.html" class="btn-primary">Go to Reset Password →</a>
  </div>
</div>
<script>
  setTimeout(function() { window.location.href = '/forgot-password.html'; }, 2000);
</script>
</body>
</html>
