<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ConsTradeHire</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { background: var(--gray-50); }
    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }
    .logo { font-size: 22px; font-weight: 800; color: var(--blue); text-decoration: none; margin-bottom: 28px; }
    .card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow-md); text-align: center; }
  </style>
  <script src="/speed-insights.js"></script>
</head>
<body>
<div class="page">
  <a href="/" class="logo">ConsTradeHire</a>
  <div class="card">
    <div style="font-size:48px;margin-bottom:16px;">🔑</div>
    <div style="font-size:20px;font-weight:800;color:var(--gray-900);margin-bottom:8px;">Password reset has moved</div>
    <div style="font-size:14px;color:var(--gray-500);margin-bottom:24px;">We now use a secure 6-digit code instead of email links. Redirecting you…</div>
    <a href="/forgot-password.html" class="btn" style="background:var(--blue);color:#fff;font-size:15px;padding:13px 24px;display:inline-block;">Go to Reset Password →</a>
  </div>
</div>
<script>
  // Redirect automatically after 2 seconds
  setTimeout(() => { window.location.href = '/forgot-password.html'; }, 2000);
</script>
</body>
</html>
